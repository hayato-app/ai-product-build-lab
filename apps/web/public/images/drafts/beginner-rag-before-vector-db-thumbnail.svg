<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">RAG before vector database</title>
  <desc id="desc">Diagram showing documents, chunks, embeddings, search, and answer generation in RAG.</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect x="74" y="74" width="1052" height="482" rx="34" fill="#fff" stroke="#dbeafe" stroke-width="4"/>
  <text x="122" y="150" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#0f172a">RAG Basics</text>
  <text x="122" y="196" font-family="Arial, sans-serif" font-size="24" fill="#475569">Vector DB is only one part of retrieval quality.</text>
  <rect x="120" y="288" width="170" height="100" rx="22" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="205" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#1d4ed8">Docs</text>
  <rect x="335" y="288" width="170" height="100" rx="22" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="420" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#15803d">Chunks</text>
  <rect x="550" y="288" width="170" height="100" rx="22" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="635" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#c2410c">Embedding</text>
  <rect x="765" y="288" width="170" height="100" rx="22" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="850" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#6d28d9">Search</text>
  <rect x="980" y="288" width="100" height="100" rx="22" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="1030" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#0e7490">Answer</text>
  <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round"><path d="M290 338 H335"/><path d="M505 338 H550"/><path d="M720 338 H765"/><path d="M935 338 H980"/></g>
  <text x="122" y="494" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">Design chunks and evaluation questions before adding complexity.</text>
</svg>

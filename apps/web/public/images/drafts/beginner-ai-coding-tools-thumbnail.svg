<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI coding tools workflow</title>
  <desc id="desc">A bright diagram showing prompt, code diff, test, and review steps for beginner AI coding tools.</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect x="70" y="70" width="1060" height="490" rx="36" fill="#ffffff" stroke="#dbeafe" stroke-width="4"/>
  <circle cx="162" cy="164" r="46" fill="#2563eb"/>
  <text x="162" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff">AI</text>
  <text x="240" y="150" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#0f172a">AI Coding Tools</text>
  <text x="240" y="198" font-family="Arial, sans-serif" font-size="24" fill="#475569">Plan small changes, inspect diffs, run checks.</text>
  <g font-family="Arial, sans-serif" font-size="24" font-weight="700">
    <rect x="115" y="285" width="210" height="118" rx="22" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="220" y="335" text-anchor="middle" fill="#1d4ed8">Prompt</text>
    <text x="220" y="370" text-anchor="middle" font-size="18" fill="#64748b">scope + rules</text>
    <rect x="370" y="285" width="210" height="118" rx="22" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="475" y="335" text-anchor="middle" fill="#15803d">Code Diff</text>
    <text x="475" y="370" text-anchor="middle" font-size="18" fill="#64748b">small changes</text>
    <rect x="625" y="285" width="210" height="118" rx="22" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="730" y="335" text-anchor="middle" fill="#c2410c">Tests</text>
    <text x="730" y="370" text-anchor="middle" font-size="18" fill="#64748b">build + checks</text>
    <rect x="880" y="285" width="210" height="118" rx="22" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="985" y="335" text-anchor="middle" fill="#6d28d9">Review</text>
    <text x="985" y="370" text-anchor="middle" font-size="18" fill="#64748b">human approval</text>
  </g>
  <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M325 344 H370"/>
    <path d="M580 344 H625"/>
    <path d="M835 344 H880"/>
  </g>
  <text x="115" y="485" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">Beginner rule: let AI assist, but verify every change.</text>
</svg>

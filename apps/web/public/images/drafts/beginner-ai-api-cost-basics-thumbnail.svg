<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI API cost basics</title>
  <desc id="desc">Diagram showing AI API cost as input tokens, output tokens, requests, and monthly usage.</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect x="74" y="74" width="1052" height="482" rx="34" fill="#fff" stroke="#dbeafe" stroke-width="4"/>
  <text x="122" y="150" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#0f172a">AI API Cost Basics</text>
  <text x="122" y="196" font-family="Arial, sans-serif" font-size="24" fill="#475569">Estimate before publishing: tokens × requests × users.</text>
  <rect x="132" y="275" width="210" height="126" rx="22" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="237" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1d4ed8">Input</text>
  <text x="237" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#64748b">tokens</text>
  <rect x="390" y="275" width="210" height="126" rx="22" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="495" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#15803d">Output</text>
  <text x="495" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#64748b">tokens</text>
  <rect x="648" y="275" width="210" height="126" rx="22" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="753" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#c2410c">Requests</text>
  <text x="753" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#64748b">per user</text>
  <rect x="906" y="275" width="160" height="126" rx="22" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="986" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#6d28d9">Month</text>
  <text x="986" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#64748b">usage</text>
  <text x="122" y="494" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">Control output length, retry count, and model choice.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI app requirements checklist</title>
  <desc id="desc">Diagram showing purpose, input, output, evaluation, limits, and operation for AI app requirements.</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect x="74" y="74" width="1052" height="482" rx="34" fill="#fff" stroke="#e2e8f0" stroke-width="4"/>
  <text x="122" y="150" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#0f172a">AI App Requirements</text>
  <text x="122" y="196" font-family="Arial, sans-serif" font-size="24" fill="#475569">Decide what to build before prompting the model.</text>
  <g font-family="Arial, sans-serif" font-size="24" font-weight="700">
    <rect x="130" y="270" width="170" height="90" rx="20" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="215" y="325" text-anchor="middle" fill="#1d4ed8">Purpose</text>
    <rect x="330" y="270" width="170" height="90" rx="20" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="415" y="325" text-anchor="middle" fill="#15803d">Input</text>
    <rect x="530" y="270" width="170" height="90" rx="20" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="615" y="325" text-anchor="middle" fill="#c2410c">Output</text>
    <rect x="730" y="270" width="170" height="90" rx="20" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="815" y="325" text-anchor="middle" fill="#6d28d9">Evaluate</text>
    <rect x="930" y="270" width="150" height="90" rx="20" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="1005" y="325" text-anchor="middle" fill="#0e7490">Limits</text>
  </g>
  <rect x="285" y="430" width="630" height="58" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="600" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">Logs, errors, cost, and improvement cycle</text>
</svg>

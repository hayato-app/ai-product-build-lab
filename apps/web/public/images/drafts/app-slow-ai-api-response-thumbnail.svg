<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI API latency breakdown</title>
  <desc id="desc">Diagram splitting slow AI API response into pre-processing, API wait, post-processing, and UI display.</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect x="72" y="72" width="1056" height="486" rx="34" fill="#fff" stroke="#e2e8f0" stroke-width="4"/>
  <text x="120" y="150" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#0f172a">Slow AI API Response</text>
  <text x="120" y="196" font-family="Arial, sans-serif" font-size="24" fill="#475569">Measure each step before changing the model.</text>
  <g font-family="Arial, sans-serif">
    <rect x="120" y="290" width="210" height="116" rx="22" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="225" y="340" text-anchor="middle" font-size="25" font-weight="700" fill="#1d4ed8">Input</text>
    <text x="225" y="372" text-anchor="middle" font-size="18" fill="#64748b">validation</text>
    <rect x="380" y="290" width="210" height="116" rx="22" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="485" y="340" text-anchor="middle" font-size="25" font-weight="700" fill="#15803d">API Wait</text>
    <text x="485" y="372" text-anchor="middle" font-size="18" fill="#64748b">model response</text>
    <rect x="640" y="290" width="210" height="116" rx="22" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="745" y="340" text-anchor="middle" font-size="25" font-weight="700" fill="#c2410c">Postprocess</text>
    <text x="745" y="372" text-anchor="middle" font-size="18" fill="#64748b">save + format</text>
    <rect x="900" y="290" width="180" height="116" rx="22" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="990" y="340" text-anchor="middle" font-size="25" font-weight="700" fill="#6d28d9">UI</text>
    <text x="990" y="372" text-anchor="middle" font-size="18" fill="#64748b">feedback</text>
  </g>
  <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round"><path d="M330 348 H380"/><path d="M590 348 H640"/><path d="M850 348 H900"/></g>
  <text x="120" y="494" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">Log apiMs, totalMs, input length, and output length.</text>
</svg>

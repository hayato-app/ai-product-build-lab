<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI agent platform competition impact</title>
  <desc id="desc">A bright explanatory diagram showing AI agent platforms, tools, permissions, logs, and human review.</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect x="72" y="70" width="1056" height="490" rx="34" fill="#ffffff" stroke="#e2e8f0" stroke-width="4"/>
  <text x="118" y="145" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">AI Agent Competition</text>
  <text x="118" y="190" font-family="Arial, sans-serif" font-size="24" fill="#475569">What developers should evaluate beyond model demos</text>
  <rect x="118" y="260" width="270" height="170" rx="26" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="253" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1d4ed8">Agent</text>
  <text x="253" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#64748b">plans multi-step work</text>
  <rect x="466" y="230" width="260" height="92" rx="22" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="596" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#15803d">Tools</text>
  <rect x="466" y="368" width="260" height="92" rx="22" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="596" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#c2410c">Permissions</text>
  <rect x="805" y="230" width="260" height="92" rx="22" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="935" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#6d28d9">Logs</text>
  <rect x="805" y="368" width="260" height="92" rx="22" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="935" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0e7490">Review</text>
  <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round">
    <path d="M388 345 H466"/>
    <path d="M726 276 H805"/>
    <path d="M726 414 H805"/>
  </g>
  <text x="118" y="505" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">Key point: safe automation needs scope, auditability, and approval gates.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Next.js AI API safe route</title>
  <desc id="desc">Diagram showing browser to route handler to AI API with API key kept on server side.</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect x="74" y="76" width="1052" height="478" rx="34" fill="#fff" stroke="#dbeafe" stroke-width="4"/>
  <text x="122" y="150" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#0f172a">Next.js + AI API</text>
  <text x="122" y="196" font-family="Arial, sans-serif" font-size="24" fill="#475569">Keep secrets in Route Handlers, not the browser.</text>
  <rect x="120" y="292" width="240" height="122" rx="24" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="240" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1d4ed8">Client</text>
  <text x="240" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#64748b">input + display</text>
  <rect x="480" y="292" width="240" height="122" rx="24" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="600" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#15803d">Route Handler</text>
  <text x="600" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#64748b">API key + validation</text>
  <rect x="840" y="292" width="240" height="122" rx="24" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="960" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#c2410c">AI API</text>
  <text x="960" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#64748b">generation</text>
  <g stroke="#94a3b8" stroke-width="5" stroke-linecap="round"><path d="M360 353 H480"/><path d="M720 353 H840"/></g>
  <text x="122" y="494" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">Common mistake: calling the AI API directly from Client Components.</text>
</svg>
